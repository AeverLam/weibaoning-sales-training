version: '3.8'

services:
  # 飞书机器人服务
  feishu-bot:
    build: .
    container_name: weibaoning-feishu
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN}
      - APP_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - weibaoning-network

  # 微信机器人服务
  wechat-bot:
    build: .
    container_name: weibaoning-wechat
    restart: always
    ports:
      - "5001:5001"
    environment:
      - WECHAT_TOKEN=${WECHAT_TOKEN}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - APP_ENV=production
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python3 -m scripts.wechat_bot
    networks:
      - weibaoning-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: weibaoning-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - feishu-bot
      - wechat-bot
    networks:
      - weibaoning-network

networks:
  weibaoning-network:
    driver: bridge

volumes:
  data:
  logs:
