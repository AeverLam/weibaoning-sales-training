# Render 部署配置文件

services:
  - type: web
    name: weibaoning-feishu-bot
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: bash start.sh
    envVars:
      - key: FEISHU_APP_ID
        value: cli_a938ac2a24391bcb
      - key: FEISHU_APP_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
    autoDeploy: true
